server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://beaconfire-db.c3kgy4c20ix9.us-east-2.rds.amazonaws.com:3306/beaconfire?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/New_York
    username: admin
    password: beaconfire123
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  jackson:
    time-zone: America/New_York

  jpa:
    open-in-view: false
    show-sql: true

    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092

management:
  health:
    db:
      enabled: false

  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

security:
  jwt:
    token:
      key: ourSecretTokenKeyUsedToJWTMustBeLongEnough
      expiration: 86400000

registration:
  token:
    expiration:
      hours: 3

springdoc:
  swagger-ui:
    path: /swagger-ui.html

  api-docs:
    path: /v3/api-docs

kafka:
  topic:
    email: email-topic