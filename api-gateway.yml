server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "*"

spring:
  cloud:
    gateway:
      server:
        webflux:

          globalcors:
            add-to-simple-url-handler-mapping: true

            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - http://localhost:5173
                  - http://localhost:3000

                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS

                allowedHeaders:
                  - "*"

                allowCredentials: true

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

          routes:
            - id: auth-server
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

            - id: employee-service
              uri: lb://EMPLOYEE-SERVICE
              predicates:
                - Path=/employee/**

            - id: application-service
              uri: lb://APPLICATION-SERVICE
              predicates:
                - Path=/application/**

            - id: housing-service
              uri: lb://HOUSING-SERVICE
              predicates:
                - Path=/housing/**