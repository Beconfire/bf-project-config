server:
  port: 8084

spring:
  datasource:
    url: jdbc:mysql://beaconfire-db.c3kgy4c20ix9.us-east-2.rds.amazonaws.com:3306/beaconfire?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/New_York
    username: admin
    password: beaconfire123
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  jpa:
    open-in-view: false
    show-sql: true

    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

management:
  health:
    db:
      enabled: false

  endpoints:
    web:
      exposure:
        include: "*"

security:
  jwt:
    token:
      key: ourSecretTokenKeyUsedToJWTMustBeLongEnough

eureka:
  client:
    enabled: true

  instance:
    prefer-ip-address: true
    hostname: localhost
    ip-address: 127.0.0.1
    instance-id: ${spring.application.name}:${server.port}