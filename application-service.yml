server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://beaconfire-db.c3kgy4c20ix9.us-east-2.rds.amazonaws.com:3306/beaconfire?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/New_York
    username: admin
    password: beaconfire123
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  jackson:
    time-zone: America/New_York

  jpa:
    open-in-view: false
    show-sql: true

    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        max.block.ms: 1000

        spring:
          json:
            add:
              type:
                headers: false

    consumer:
      group-id: application-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  health:
    db:
      enabled: false

  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

security:
  jwt:
    token:
      key: ourSecretTokenKeyUsedToJWTMustBeLongEnough

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html

app:
  email:
    topic: email-topic

  visa:
    workflow:
      topic: visa-workflow-events

eureka:
  client:
    enabled: true
